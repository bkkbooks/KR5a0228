front:
  text: 二經同卷珠二
  hash: sha256:13f0c113ccfecee5f9065d2c360e1ed944df578f4ce5c9a642f4ce803be2da66
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0228_HFL_000-001a, image: hfl/0112/0112-040.png}
body:
  text: 真龍虎九仙經龍虎中丹訣真龍虎九仙經羅葉二真人注天真皇人語黃帝曰子欲修其身先須靜其意葉公曰凡修長生久視者先忘意無七件事方始得成故曰先須靜意無散亂無煩怒無起著無妄想無貪愛無邪淫無放逸羅公曰凡修道散亂其意不竪何時得就若有嗔怒其心神燥放逸成散亂也又不得起諸緣著故修之要一意精勤無諸妄想又其意多為貪愛起邪淫故其心不忘其事不成但無貪愛豈有邪淫凡修身一志不要放逸若放逸則不成假使一年功修得十一箇月日巳上放却一兩日再修之前功勞皆失也是故不離時餉放逸其心內安其神外去其欲葉公曰內安其神者黃庭經云人有五藏六腑三魂七魄毛髮巳來皆有其神常叩齒集其神或三十六通或二十四通內安神無令散亂切忌淫欲也羅公曰安神者叩齒想於三魂作仙真之形人身之福神也號曰胎光爽靈幽精想之如有願具告之必從其事鎖於臍下三魂安則衆神安三魂不安則衆神不安故黃庭經云三魂陽神也好人修生若人淫欲其精枯精枯其命殂是故魂神曰幽精憂人精枯泣告爽靈爽靈既知則離頂門頂門胎光光乃漸減神乃散亂也故衆神不安人則患生神散曰死故外去其欲也當修其事若衆患起以氣理之葉公曰此者是天真皇人故引黃帝問也黃帝乃問天真曰凡修其道豈有患乎天真曰凡人有遇道晚矣巳泄其真氣氣虛敗也葉公曰未過之前多施泄也帝曰如何氣理天真曰少用水大用火一切大患無能拒於火也葉公曰夫水火者古聖大藥也不在於外凡人身上有水有火雖互說不同其歸一也心為火應離腎為水應坎凡修道造金丹須憑龍虎水火也先靜地户如水後下龍虎交之有度用之有數下心火燒能理衆病虛者補顏如童故曰龍虎金丹大藥也故諸患皆愈也又有患少者以法水洗從頂至足用腎水洗之也又有患大者從足至頂用心火燒之也又有大患乃為無常至用火拒煞鬼法度並見下注羅公曰凡用水火理病患皆一息內也用水想腎藏兩條黑氣如烟直上至頂如烟滿泥丸宮化為水自泥丸洗下之至臂洗之了入五臟六腑及至足了舉足起以意想之歸本腎宮若患癕疽等病想入大腸自然轉動也若用火者心下火至左右足上至手及頂一息之中九壯其氣病自除熱則用水冷則用火若學道瞑目鼻上望寸絲亦不得想離其本腔趄之即為定趄者不進也葉公曰以本意在鼻上曰玄牝門諸事俱捨不挂寸絲離其本念定息趄其來去不出不入也為之定法羅公曰玄牝門者鼻也與肺合其出入息今為定法鼻上住息一意堅守為定故曰守一也諸境不得逐抽掣何模樣次入眉間觀白毫光葉現羅公曰如鼻上定則觀諸境不動如龜毛兔角抽掣自然向眉間想之白毫光明見三世事以定力故切不在著諸境必觀之在眉間俱現眉上力極移入頂中三件定實功乃騰矣無心無著外想不入衆禍不加從九至九鍊七至七羅公曰從九至九一度鼻至眉眉至鼻鼻却至頂皆三度曰九從九至九每日造九度乃九九八十一矣造作至四十九日必日定矣一伏時不出不入葉公曰定力得者必成真仙也若愛來與去久隱在世間當想開頂門黃霞滿天地羅公曰此法修之隱跡遁世也從脾上起黃雲撞頂男左掩右女右掩左男修之黃雲舉起撞左想左邊髙然後聖身出時用手壓右今下也女修之黃雲撞右邊想聖身出用手壓左畔下然後方出葉公曰虛無也此法黃雲遍滿內外感應體上俱黃也修此法起黃雲每日撞於頂門一息內撞三七度凡每日如斯作二十一遍也如斯二十一日也能出黃氣故曰黃霞滿天地也冥心細想內自有神用意行之去來自在欲離其腔黃霞重蓋羅公曰冥心細想身上靈冥坐在金堂玉闕之內用意想此靈冥乘黃雲起來開頂門乘黃雲坐力極歸頂門內閉頂門却入金堂玉闕又想出入如此數凡四十九度也故經云六時行道四十九遍也凡離身之時須留黃雲一朵蓋頂門然後乘黃雲一朵下了回靣看本身也但修行無間斷方成至四十五日當有水墨形現也諸人亦見一百八十日自然去住自在凡去時身上下俱如冰雪也回來時還開頂門歸身上下俱暖也葉公曰仙家睡法卧而為之亦如羅公所說也不論年月多少去時如睡也回時如睡覺也或歸住本體或離入他身或別從初起或奪他安巳或今他離體或方便相救或廣施安隱或自利損他罰著身必墜此法實無虛永劫只如是羅公曰此者神仙也身隱凡世神氣俱靈出入分眀曰神仙也亦曰氣仙來去自在若犯仙戒取次必被罰也葉公曰神仙之作用也若更求真仙及修上升天仙之行皆在進修作用也此法為小術自利自家修久住於世間自在常出沒投胎二移舍三舊居四奪位若修分身法須待陽數興冥心坐靜室分明鍊五神羅公曰凡修身須近一陽生方動功也夫金丹大藥皆在冥心心若一著無有不成若蒙至人傅訣依法修之切在戒慎分明靜室息諸事想恍惚之中有神曰靈冥也鍊五臟氣方成大道故道德經云恍恍惚惚其中有物杳杳冥冥其中有精葉公曰夫大道不逺只在人身恍惚杳冥皆自習學故老君云吾本學習非自然也先須習於前來定法後待一陽冥心靜室乃鍊五臟之精氣方為修道也頂上藏太陽四十五數足羅公曰日者魂也屬陽月者魄也屬隂故真仙無影純陽也又吞日華諸家互說不同唯有鼻接而不搐者妙也有一方不用河車便自玄牝入直至頂門三點仰之即頂後如圎光也此經不言河車定不用也日四十五度至四十五日自一陽至立春也腸之數也葉公曰日魂月魄凡日為陽數乃隂數之八九七十二也月為隂數乃用陽數也九九八十一也今此法純陽故使四十五數也不使河車順天道左轉自玄牝隨定至頂後也凡四十五度至四十五日共計二千二十五數也眉下五輪旋還在定中起羅公曰五輪眼也定中運水火於目中故云還自定中起也火中有木神水內有金氣水火五藏交來往不離土羅公曰真龍虎者眼為五輪王火有五輪王水水難得光閃水下含養於口中從閃火下入肝肝為木木色青故為青龍也水入肺肺為金金色白故為白虎也龍火從左下入肝穿右出却來入左虎水從右下入肺穿肺左出却入右者五藏氣交也葉公曰青龍晝先行白虎後去屬腸也晝二十四度也夜白虎先行青龍後至屬隂也夜三十六度也晝行四六數夜四九數也耕種脾上生黃芽為命根然後想真精兩腎合一氣心血下結成方成嬰兒象羅公曰真精內津也身象鼎也左腳壓右足兩手俱身後如鼎虛三足凝結以心血蓋之結之方想成嬰孩如已之形貌無異也其孩兒雖結就黃芽脾上生方為命之根也土上有黃芽方為已之命葉公曰精暖血熱結之為胎如婦人交感亦因精血成胎也今之聖胎自巳所造不自外來方為聖也凡女人修之亦想腎出精入血海內凝結成形也然後食黃芽大藥黃芽大藥真龍虎丹砂以為命之本也日初入照水百度日踐影兩腎日月光各出赤曰氣羅公曰凡結聖胎後須鍊聖身每日日出卯時冥心靜坐想右腎為月月出赤氣赤氣入水變白如半月之狀乘聖身起想左腎為日日中出白氣白氣入水變赤如火在半月下乘之漸漸舉起至金堂玉闕乃被頂上前來四十五日收者太陽照之其聖胎才被日光照著驚投水中一息內作也每時作三十三度自卯至辰巳三時共合九十九數葉公曰聖胎每日自卯時鍊之至午前二百度也每想兩腎為日月日出白氣入精海變歸本體還元赤也月出赤氣入精海水內却歸本體白如半月自精海內乘嬰兒起右日中白氣化為赤火如圓光外火熖也每度被頂上太陽照之其光自頂分明入五臟直至明照著其孩子嬰孩翻身入精海內了却再想日月起象也並圖於後學者切須審詳看之其法用九十九假如至一百度剩亦無妨也夜夜七七出頂門自有應十月與身等冥冥為地仙羅公曰聖身就夜夜自精海中乘紫雲起來至金堂玉闕中一一遍觀從頂至足備認之然後突出頂門乘葉雲定息息極方下來入金堂玉闕也方開息却再住息準前出如斯四十九遍也十月滿當其二身大小長短形貌同也獵步離身隨意自在葉公曰地仙者勝神仙也出入一如神仙法惟有聖胎十月不同晝夜用功也成後日中無影乃與衣服著免凡人覺察與凡間衣服及帽天上日照影中見戴帽圖得日中有影故號曰隱形也獵步一百八十日可行萬里也入山為地仙鍊腎臟之氣出入於耳中如斯一百日方住江海內羅公曰水仙者當定息鍊氣想腎為黑雲入八於耳內來往一百日後入水自有水中得道之類請為主當也葉公曰水仙雖功少一百日見不如於地仙也鍊精華為劔巡遊四天下能報恩與寃是名為烈士羅公曰列仙俠有九等不同第一天俠第二仙俠第三靈俠第四風俠第五水俠第第一天俠本天仙奉上帝賜劒也第二仙六火俠第七氣俠第八鬼俠第九遇劔俠俠巳修上真升天之行又復鍊氣為錘劔第三靈俠巳是地仙鎮居山嶽及鍊就剱七萬里聞有不平之事飛劔立至謂之靈俠第四風俠亦是地仙鍊得剱七修之間斷未通極靈知有不平通風處身劔一時俱至也第五水俠本是水仙鍊成號曰水俠無水不可飛騰也第六火俠修之自焚起亦號火光三昧鍊七劔成了身欲飛騰須化火一團乘而來往故號火俠也第七氣俠唯學定息氣便將精華鍊劔劔成如氣仗而往來號曰氣劒也第八鬼俠人不見其形本修神仙水墨形水墨劔也出入往來如氣不殊第九遇劔俠者或因遇於寶劔亦得隨意東西變現也葉公曰鍊劔者先收精華後起心火肺為風鞴肝木為岌脾為黃泥腎為日月精罡也腎為水脾土為泥模身為爐一息氣中為法息成劒之氣也磨之於膽也心為火再燒精華內淬又膽上磨九度了一度一度磨時肝血染著故曰耶溪鐡打即精華也師子膽磨麗水金粧即心火燒時肺為火爍金鎔滴在劒上也蛟龍血洗磨時肝血染著也若鑄金鎚又則不同每咽日月華納歸肺藏肺緣屬金故號金鎚也又金鎚出準前是黃金本肺應白何得却黃本肺臟是脾之子肺主涕若吞日月華納歸肺一十二月滿舉心火下火鑄之火尅金故一時鎔下脾為土為模也號子投母乃隨母之象脾黃氣起拒火之力方成金鎚凡鑄劔就者即為列仙也烈士遊四天下宇宙之中折平處衆不得非為也有人遇者傳得金鎚七劔皆有神通也錬五臟之精各滿九九數金鼎收其氣身騰而升天羅公曰夫錬五臟氣凡秋七月水生方錬腎十月立冬木生方錬於肝正月火生方錬於心四月金生乃錬於肺土旺四季脾氣錬之無時每氣八十一日五氣俱就乃出入俱自在也或左右手五指之內出光明五色或頂門或足下五雲俱捧故乃升天矣葉公曰凡修此五臟氣成假使未朝上帝乘之遊四天下自在無障礙也若待上帝天符來詔方去朝天騰身升天且住物外也聖身離俗塵綿綿而默默定中却投胎再修還再結一紀變四身漸漸準前化現之應無盡方號真變易此法皆順成斷無逆化也羅公曰不逆化者謂不焚身並不降三尸九蟲也別有一法為之鍊形焚身化火從下至頂想如紅焰遍於一身想三尸九蟲七魄俱出也乃成逆化今法俱得道也三尸九蟲七魄並同升天也葉公曰順者為大限至不與他爭而化火相拒或用三昧定息鬼神自伏也或用三昧定化火曰焰慧地也或移舍而避之故曰順成斷無逆化也凡學之者切在堅心也此經非人勿傳羅公曰恐後不曉而圖於後凡傳者先須齊戒於甲子甲午北面作禮而傳傳本者為師受者為第子或若非違即獲大罪真龍虎九仙經終
